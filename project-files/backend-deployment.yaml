apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: rawdaessamrou/backend:v2
          ports:
            - containerPort: 5000
          imagePullPolicy: Always
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: "rootpassword"
            - name: MYSQL_DATABASE
              value: "projectdb"
            - name: MYSQL_USER
              value: "projectuser"
            - name: MYSQL_PASSWORD
              value: "projectpassword"