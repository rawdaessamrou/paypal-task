apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: project-ingress
  namespace: default
spec:
  ingressClassName: nginx
  rules:
    - host: project.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
          - path: /submit
            pathType: Exact
            backend:
              service:
                name: backend-service
                port:
                  number: 5000